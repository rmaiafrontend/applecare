<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      img-src 'self' data: blob: https:;
      font-src 'self' https://fonts.gstatic.com;
      connect-src 'self' https://fonts.googleapis.com;
      frame-src 'self';
      object-src 'none';
      base-uri 'self';
    " />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo-alink.png" />

    <!-- Title & Description -->
    <title>aLink — Seu catálogo Apple com IA</title>
    <meta name="description" content="Catálogo de produtos Apple originais com entrega express em 1 hora. iPhone, MacBook, iPad, Apple Watch e acessórios com garantia e os melhores preços." />
    <meta name="keywords" content="apple, iphone, macbook, ipad, airpods, apple watch, entrega rápida, express, alink" />
    <meta name="author" content="aLink" />

    <!-- Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#007aff" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="aLink" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="aLink — Seu catálogo Apple com IA" />
    <meta property="og:description" content="Produtos Apple originais com entrega express em 1 hora. Garantia oficial e melhores preços." />
    <meta property="og:site_name" content="aLink" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="aLink — Seu catálogo Apple com IA" />
    <meta name="twitter:description" content="Produtos Apple originais com entrega express em 1 hora. Garantia oficial e melhores preços." />
  </head>
  <body>
    <script src="/theme-init.js"></script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
